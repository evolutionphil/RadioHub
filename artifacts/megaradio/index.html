<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mega Radio - Listen to Free Live Radio Online</title>
    <meta name="description" content="Listen to live radio online with Mega Radio! 60,000+ AM/FM stations from 120+ countries, music, news, sports, and talk shows for free." />
    
    <!-- SEO Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="yandex-verification" content="57c83c6ab08ec3ba" />
    <!-- Canonical tag dynamically set by SeoHead component -->
    
    <!-- Favicon and Apple Touch Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Mobile and PWA Meta Tags -->
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-title" content="Mega Radio">
    <!-- CRITICAL for Safari iOS background audio: prevent PWA mode -->
    <meta name="apple-mobile-web-app-capable" content="no" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Mega Radio">
    <meta name="msapplication-TileColor" content="#1a1a2e">
    <meta name="msapplication-TileImage" content="/apple-touch-icon.png">
    
    <!-- Core Web Vitals Performance Optimizations - No external font requests -->
    <link rel="dns-prefetch" href="https://flagcdn.com">
    <!-- 🚀 PERF: Preconnect to API origin (3-service split) — saves ~300-1000ms TLS+TCP on first API call -->
    <link rel="preconnect" href="https://api.themegaradio.com" crossorigin>
    <link rel="dns-prefetch" href="https://api.themegaradio.com">
    
    <!-- 🚀 Preload critical resources for LCP optimization -->
    <link rel="preload" href="/header-logo-80w.webp" as="image" type="image/webp" fetchpriority="high">
    <!-- 🚀 CRITICAL: Hero background - aligned with <picture> breakpoint (768px) in radio-frontend.tsx -->
    <link rel="preload" href="/images/hero-bg-430w.webp" as="image" type="image/webp" media="(max-width: 767px)" fetchpriority="high">
    <link rel="preload" href="/images/hero-bg.webp" as="image" type="image/webp" media="(min-width: 768px)" fetchpriority="high">
    
    <!-- 🚀 Preload local Ubuntu fonts for critical weights used in rendering -->
    <link rel="preload" href="/fonts/ubuntu-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/ubuntu-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/ubuntu-700.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- Critical above-the-fold CSS - INLINED -->
    <style>
      /* Critical CSS for immediate rendering */
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        color: #ffffff;
        line-height: 1.5;
      }
      
      *, *::before, *::after { box-sizing: border-box; }
      
      img { 
        height: auto; 
        max-width: 100%;
        display: block;
        /* SEO: Native lazy loading for better performance */
        loading: lazy;
      }
      
      /* CLS OPTIMIZATION: Images with width/height preserve aspect ratio automatically in modern browsers */
      
      /* Optimize above-the-fold images */
      img[data-priority="high"] {
        loading: eager;
      }
      
      .header-critical {
        background-color: #0a0a0a;
        border-bottom: 1px solid #1f1f1f;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      
      .container-critical {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      
      .btn-critical {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.2s;
        border: none;
        cursor: pointer;
      }
      
      .btn-primary-critical {
        background-color: #dc2626;
        color: white;
      }
      
      .btn-primary-critical:hover {
        background-color: #b91c1c;
      }
      
      .below-fold { visibility: hidden; }
      
      .skeleton {
        background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      .search-critical {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: white;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        width: 100%;
        max-width: 400px;
      }
      
      @media (max-width: 768px) {
        .container-critical { padding: 0 0.75rem; }
        .btn-critical { padding: 0.5rem 0.75rem; font-size: 0.875rem; }
      }
    </style>
    
    <!-- Performance monitoring script -->
    <script>
      // Early performance monitoring
      window.performance = window.performance || {};
      window.performance.mark && window.performance.mark('head-end');
    </script>

    <!-- V-A4 FIX (2026-05-08): static Organization + WebSite JSON-LD blocks
         removed. The SSR layer (server/seo-renderer.ts -> generateHtmlHead)
         emits authoritative Organization, WebSite, and page-specific
         schemas dynamically per request/locale with the correct
         hreflang-aware URLs. Keeping static copies here caused duplicate
         schema warnings in Search Console (two Organization entities
         pointing at the same URL) and forced English-only descriptions
         into non-English pages. -->

    <!-- 2026-05-12 perf: Partytown bootstrap. Forwards the well-known
         analytics queue APIs (window.dataLayer.push for GA, window.gtag
         for GA, window.clarity for Microsoft Clarity) to the Web Worker
         that Partytown spins up. ONLY analytics scripts use
         type="text/partytown"; AdSense + Cast SDK stay on the main
         thread (see /replit.md "Performance optimization landmines").

         IMPORTANT: Partytown spawns a same-origin sandboxed <iframe> to
         host the Web Worker. Inside Replit's dev preview the page is
         already iframed by Replit's proxy on a different origin, which
         makes Partytown's frame access fail with "Blocked a frame with
         origin ... from accessing a cross-origin frame". So we only
         bootstrap Partytown on real production hostnames. On Replit
         dev the analytics scripts (`type="text/partytown"`) will simply
         be ignored by the browser — analytics keep working in prod and
         dev preview is hassle-free. -->
    <script>
      (function () {
        var host = window.location.hostname || '';
        var isReplitOrLocal =
          host.indexOf('replit') !== -1 ||
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host === '0.0.0.0';
        if (isReplitOrLocal) return;
        window.partytown = {
          forward: ['dataLayer.push', 'gtag', 'clarity']
        };
        var s = document.createElement('script');
        s.src = '/~partytown/partytown.js';
        s.async = true;
        document.head.appendChild(s);
      })();
    </script>

    <!-- Microsoft Clarity tracking code for https://themegaradio.com/
         — runs inside a Partytown Web Worker (type="text/partytown"),
         still deferred to requestIdleCallback to delay the script
         injection until after the main thread is idle. -->
    <script type="text/partytown">
    if ('requestIdleCallback' in window) {
      requestIdleCallback(function() {
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i+"?ref=bwt";
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "u56nfdsjou");
      }, { timeout: 5000 });
    } else {
      setTimeout(function() {
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i+"?ref=bwt";
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "u56nfdsjou");
      }, 2000);
    }
    </script>

    <!-- 🚀 PERF: Defer Google AdSense + Cast SDK to requestIdleCallback so
         Lighthouse / PageSpeed Insights can reach "network idle" within its
         60s budget. Without this defer, PSI was returning DEADLINE_EXCEEDED
         for themegaradio.com because Adsense + Cast SDK keep opening new
         requests for >60s after page load, preventing the audit from
         finishing. Both scripts still load on real browsers — just after
         FCP/LCP/TTI are measured. -->
    <script>
      (function () {
        function loadDeferredScripts() {
          var ads = document.createElement('script');
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8771434485570434';
          document.head.appendChild(ads);

          var cast = document.createElement('script');
          cast.async = true;
          cast.src = 'https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1';
          document.head.appendChild(cast);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadDeferredScripts, { timeout: 4000 });
        } else {
          setTimeout(loadDeferredScripts, 3000);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Main application script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Script to show below-fold content and optimize loading -->
    <script>
      // Performance optimizations
      window.performance.mark && window.performance.mark('body-start');
      
      document.addEventListener('DOMContentLoaded', function() {
        // Show below-fold content after initial render
        setTimeout(function() {
          var belowFoldElements = document.querySelectorAll('.below-fold');
          belowFoldElements.forEach(function(el) {
            el.style.visibility = 'visible';
          });
          
          // Mark critical content as loaded
          window.performance.mark && window.performance.mark('critical-content-loaded');
        }, 100);
        
        // 🚀 PERF (2026-05-12): Preload next page resources on hover —
        // ONLY on devices with a fine pointer (mouse). On mobile/touch
        // devices `mouseover` fires synthetically on tap, which would
        // waste bandwidth and slow the actual click. The previous
        // unconditional `{ once: true }` listener also only prefetched
        // ONE link per page and could fire on a non-navigation element;
        // restricting via media query + early-out keeps desktop wins
        // without mobile cost.
        if (window.matchMedia && window.matchMedia('(hover: hover) and (pointer: fine)').matches) {
          document.addEventListener('mouseover', function(e) {
            var a = e.target.closest && e.target.closest('a[href]');
            if (!a || !a.href || a.target === '_blank') return;
            // Only prefetch same-origin pages
            try {
              var u = new URL(a.href, location.href);
              if (u.origin !== location.origin) return;
            } catch (_) { return; }
            var link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = a.href;
            document.head.appendChild(link);
          }, { once: true, passive: true });
        }
      });
      
      // Critical Web Vitals measurement
      window.addEventListener('load', function() {
        window.performance.mark && window.performance.mark('page-loaded');
      });
    </script>
  </body>
</html>
