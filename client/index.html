    <!-- Core Web Vitals Performance Optimizations - No external font requests -->
    <link rel="dns-prefetch" href="https://flagcdn.com">
    
    <!-- 🚀 Preload critical resources for LCP optimization -->
    <link rel="preload" href="/header-logo-80w.webp" as="image" type="image/webp">
    <!-- 🚀 CRITICAL: Hero background - mobile-first preload -->
    <link rel="preload" href="/images/hero-bg-430w.webp" as="image" type="image/webp" media="(max-width: 430px)">
    <link rel="preload" href="/images/hero-bg.webp" as="image" type="image/webp" media="(min-width: 431px)">
    
    <!-- 🚀 Preload local Ubuntu fonts for critical weights used in rendering -->
    <link rel="preload" href="/fonts/ubuntu-400.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/ubuntu-500.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/fonts/ubuntu-700.ttf" as="font" type="font/ttf" crossorigin>
    
    <!-- Critical above-the-fold CSS - INLINED -->
    <style>
      /* Critical CSS for immediate rendering */
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        color: #ffffff;
        line-height: 1.5;
      }
      
      *, *::before, *::after { box-sizing: border-box; }
      
      img { 
        height: auto; 
        max-width: 100%;
        display: block;
        /* SEO: Native lazy loading for better performance */
        loading: lazy;
      }
      
      /* CLS OPTIMIZATION: Images with width/height preserve aspect ratio automatically in modern browsers */
      
      /* Optimize above-the-fold images */
      img[data-priority="high"] {
        loading: eager;
      }
      
      .header-critical {
        background-color: #0a0a0a;
        border-bottom: 1px solid #1f1f1f;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      
      .container-critical {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 1rem;
      }
      
      .btn-critical {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        text-decoration: none;
        transition: background-color 0.2s;
        border: none;
        cursor: pointer;
      }
      
      .btn-primary-critical {
        background-color: #dc2626;
        color: white;
      }
      
      .btn-primary-critical:hover {
        background-color: #b91c1c;
      }
      
      .below-fold { visibility: hidden; }
      
      .skeleton {
        background: linear-gradient(90deg, #1f1f1f 25%, #2a2a2a 50%, #1f1f1f 75%);
        background-size: 200% 100%;
        animation: loading 1.5s infinite;
      }
      
      @keyframes loading {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      
      .search-critical {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        color: white;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        width: 100%;
        max-width: 400px;
      }
      
      @media (max-width: 768px) {
        .container-critical { padding: 0 0.75rem; }
        .btn-critical { padding: 0.5rem 0.75rem; font-size: 0.875rem; }
      }
    </style>
    
    <!-- Performance monitoring script -->
    <script>
      // Early performance monitoring
      window.performance = window.performance || {};
      window.performance.mark && window.performance.mark('head-end');
    </script>

  </head>
  <body>
    <div id="root"></div>
    
    <!-- Main application script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Script to show below-fold content and optimize loading -->
    <script>
      // Performance optimizations
      window.performance.mark && window.performance.mark('body-start');
      
      document.addEventListener('DOMContentLoaded', function() {
        // Show below-fold content after initial render
        setTimeout(function() {
          var belowFoldElements = document.querySelectorAll('.below-fold');
          belowFoldElements.forEach(function(el) {
            el.style.visibility = 'visible';
          });
          
          // Mark critical content as loaded
          window.performance.mark && window.performance.mark('critical-content-loaded');
        }, 100);
        
        // Preload next page resources on hover
        document.addEventListener('mouseover', function(e) {
          if (e.target.tagName === 'A' && e.target.href) {
            var link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = e.target.href;
            document.head.appendChild(link);
          }
        }, { once: true, passive: true });
      });
      
      // Critical Web Vitals measurement
      window.addEventListener('load', function() {
        window.performance.mark && window.performance.mark('page-loaded');
      });
    </script>
  </body>
