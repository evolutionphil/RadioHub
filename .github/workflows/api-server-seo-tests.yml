name: API Server SEO sitemap & robots smoke tests

# Runs the api-server smoke test suite (Task #153) on every PR / push that
# touches the SEO sitemap pipeline so /sitemap.xml, /sitemap-index.xml,
# /sitemap-main-{lang}.xml, /llms.txt or /robots.txt regressions are caught
# before deploy instead of via Google Search Console errors in production.

on:
  push:
    paths:
      - 'artifacts/api-server/src/routes/seo-sitemap-routes.ts'
      - 'artifacts/api-server/src/seo/**'
      - 'artifacts/api-server/src/index-web.ts'
      - 'artifacts/api-server/tests/**'
      - 'artifacts/api-server/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-server-seo-tests.yml'
  pull_request:
    paths:
      - 'artifacts/api-server/src/routes/seo-sitemap-routes.ts'
      - 'artifacts/api-server/src/seo/**'
      - 'artifacts/api-server/src/index-web.ts'
      - 'artifacts/api-server/tests/**'
      - 'artifacts/api-server/package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-server-seo-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/api-server run test
