name: CI — api-server tests & workspace typecheck

# Task #195: run the api-server smoke tests (Task #153) and the full
# workspace typecheck on every push / PR that touches artifacts/api-server/**.
# This catches SEO sitemap / robots regressions and type regressions before
# they reach production instead of relying on developers to remember to run
# `pnpm --filter @workspace/api-server run test` locally.

on:
  push:
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.github/workflows/api-server-seo-tests.yml'
  pull_request:
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.github/workflows/api-server-seo-tests.yml'

jobs:
  test:
    name: api-server tests + workspace typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck workspace
        run: pnpm run typecheck
      - name: Run api-server tests
        run: pnpm --filter @workspace/api-server run test
